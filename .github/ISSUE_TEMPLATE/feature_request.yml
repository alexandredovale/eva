name: Feature request
description: Propose a focused improvement to EVA.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete problem should this change solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain the smallest compatible change.
    validations:
      required: true
  - type: textarea
    id: invariants
    attributes:
      label: Evidence and architecture impact
      description: Explain effects on literal evidence, lineage, provider neutrality, persistence, and validation.


name: Bug report
description: Report a reproducible defect without including private data.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do not include API keys, private documents, logs with sensitive data, or active credentials."
  - type: input
    id: version
    attributes:
      label: EVA version
      placeholder: "1.0.0 or commit SHA"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe reproducible example.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: PHP, database, web server, and operating system versions. Do not include secrets.


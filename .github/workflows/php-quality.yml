name: PHP quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, dom, json, mbstring, pdo, pdo_mysql
          coverage: none

      - name: Validate PHP syntax
        shell: bash
        run: find app bin bootstrap config public tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Verify public-package boundaries
        shell: bash
        run: |
          test ! -e .env
          test ! -e api_key.md
          test ! -e database/actual/eva.sql
          test ! -e docs/doc_test.md
          test ! -d docs/test

